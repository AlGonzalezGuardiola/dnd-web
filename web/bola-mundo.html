<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌐 Mundo Gumi</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #06021a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e8dff0;
    }

    canvas {
      display: block;
      position: fixed;
      inset: 0;
    }

    /* ── Selector de imagen (solo se muestra en file://) ── */
    #picker {
      display: none;                   /* oculto por defecto; JS lo muestra si file:// */
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(6, 2, 26, 0.95);
      z-index: 30;
    }
    #picker.show { display: flex; }

    .p-icon  { font-size: 48px; }
    .p-title { font-size: 18px; font-weight: 300; letter-spacing: 3px; color: #c4a8f5; }
    .p-desc  { font-size: 12px; color: rgba(200,190,220,0.55); text-align: center; line-height: 1.8; }
    .p-desc strong { color: #c4a8f5; }

    .p-btn {
      background: rgba(196, 168, 245, 0.1);
      border: 1px solid rgba(196, 168, 245, 0.35);
      border-radius: 10px;
      color: #c4a8f5;
      cursor: pointer;
      font-size: 13px;
      letter-spacing: 1px;
      padding: 10px 28px;
      transition: background 0.2s;
    }
    .p-btn:hover { background: rgba(196, 168, 245, 0.2); }

    /* ── Texto de instrucciones ── */
    #hint {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 1.2px;
      color: rgba(200, 190, 220, 0.35);
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<!-- Panel selector de archivo: visible solo en file:// -->
<div id="picker">
  <div class="p-icon">🌐</div>
  <div class="p-title">MUNDO GUMI</div>
  <div class="p-desc">
    Abre desde <strong>file://</strong> — Chrome bloquea texturas locales en WebGL.<br>
    Selecciona <strong>image.jpg</strong> para cargar la textura del mundo.
  </div>
  <label class="p-btn" for="finput">Seleccionar image.jpg</label>
  <input type="file" id="finput" accept="image/*" style="display:none">
</div>

<div id="hint">Arrastra para rotar &nbsp;·&nbsp; Rueda para hacer zoom</div>

<!-- Script clásico (no módulo): garantías de visibilidad del picker aunque el módulo falle -->
<script>
  window._isFile = (location.protocol === 'file:');

  if (window._isFile) {
    document.getElementById('picker').classList.add('show');
  }

  window.addEventListener('unhandledrejection', e =>
    console.error('Module error:', e.reason)
  );
</script>

<!-- Import map: resuelve "three" y "three/addons/" para OrbitControls -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

  // ── Renderer ────────────────────────────────────────────
  const canvas   = document.getElementById('c');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.toneMapping         = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  // ── Escena y cámara ─────────────────────────────────────
  const scene  = new THREE.Scene();
  scene.background = new THREE.Color(0x06021a);
  scene.fog        = new THREE.FogExp2(0x06021a, 0.025);

  const camera = new THREE.PerspectiveCamera(48, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(0, 1.2, 5.5);

  // ── OrbitControls ───────────────────────────────────────
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping  = true;
  controls.dampingFactor  = 0.05;
  controls.minDistance    = 2.5;
  controls.maxDistance    = 14;
  controls.enablePan      = false;
  controls.target.set(0, 0, 0);

  // ── Luces ───────────────────────────────────────────────
  // Ambiente cálido general
  scene.add(new THREE.AmbientLight(0xffeedd, 0.55));

  // Luz principal (estilo sol)
  const sun = new THREE.DirectionalLight(0xffffff, 1.8);
  sun.position.set(4, 6, 3);
  scene.add(sun);

  // Relleno turquesa — da el tono fantasía de KH
  const fillA = new THREE.PointLight(0x33ddcc, 1.1, 18);
  fillA.position.set(-5, 2, -3);
  scene.add(fillA);

  // Relleno dorado desde abajo
  const fillB = new THREE.PointLight(0xffaa33, 0.6, 12);
  fillB.position.set(1, -4, 2);
  scene.add(fillB);

  // ── Estrellas ───────────────────────────────────────────
  const STARS   = 2400;
  const starBuf = new Float32Array(STARS * 3);
  for (let i = 0; i < STARS * 3; i++) starBuf[i] = (Math.random() - 0.5) * 90;
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(starBuf, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.07, sizeAttenuation: true,
    transparent: true, opacity: 0.85,
  })));

  // ── Gradiente toon (3 bandas: sombra / medio / luz) ─────
  // Crea la rampa de color para MeshToonMaterial sin importar imagen extra
  const rampData = new Uint8Array([80, 160, 255]);
  const rampTex  = new THREE.DataTexture(rampData, 3, 1, THREE.RedFormat);
  rampTex.minFilter = rampTex.magFilter = THREE.NearestFilter;
  rampTex.needsUpdate = true;

  // ── MUNDO PRINCIPAL ─────────────────────────────────────
  // SphereGeometry con pocos segmentos + flatShading = look low-poly cartoon
  const worldGeo = new THREE.SphereGeometry(1, 12, 8);

  // Material de espera hasta que llegue la textura
  let worldMat = new THREE.MeshToonMaterial({
    color:        0x6644cc,
    gradientMap:  rampTex,
    flatShading:  true,
  });

  // Pivote: el mundo y sus anillos flotan juntos
  const worldPivot = new THREE.Group();
  scene.add(worldPivot);

  const world = new THREE.Mesh(worldGeo, worldMat);
  worldPivot.add(world);

  // Halo atmosférico suave alrededor del mundo
  const atmosMesh = new THREE.Mesh(
    new THREE.SphereGeometry(1.06, 32, 32),
    new THREE.MeshStandardMaterial({
      color: 0x8855ff, transparent: true, opacity: 0.06,
      side: THREE.FrontSide, depthWrite: false,
    })
  );
  worldPivot.add(atmosMesh);

  // ── ANILLOS orbitales ────────────────────────────────────
  // Anillo ecuatorial turquesa (tubo cuadrado: radiusSegments = 3)
  const ring1 = new THREE.Mesh(
    new THREE.TorusGeometry(1.52, 0.028, 3, 48),
    new THREE.MeshToonMaterial({
      color: 0x33ddcc, gradientMap: rampTex,
      emissive: 0x33ddcc, emissiveIntensity: 0.5,
    })
  );
  ring1.rotation.x = Math.PI / 2;
  worldPivot.add(ring1);

  // Anillo orbital inclinado dorado
  const ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(1.88, 0.018, 3, 36),
    new THREE.MeshToonMaterial({
      color: 0xffbb22, gradientMap: rampTex,
      emissive: 0xffbb22, emissiveIntensity: 0.4,
    })
  );
  ring2.rotation.x = Math.PI / 2.5;
  ring2.rotation.z = Math.PI / 5;
  worldPivot.add(ring2);

  // ── ROCAS FLOTANTES ──────────────────────────────────────
  // Cada roca: IcosahedronGeometry detail=0 (20 caras triangulares puras)
  const rockDefs = [
    { pos: [ 2.3,  0.5,  0.2], r: 0.18, color: 0xffaa44 },
    { pos: [-2.1, -0.3,  0.6], r: 0.14, color: 0xaa55ff },
    { pos: [ 0.5,  2.0, -1.1], r: 0.12, color: 0x44ddbb },
    { pos: [-0.7,  0.8,  2.1], r: 0.16, color: 0xff6677 },
    { pos: [ 1.9, -1.4, -0.7], r: 0.11, color: 0xffee44 },
  ];

  const rocks = rockDefs.map(({ pos, r, color }, i) => {
    const mesh = new THREE.Mesh(
      new THREE.IcosahedronGeometry(r, 0),
      new THREE.MeshToonMaterial({ color, gradientMap: rampTex, flatShading: true })
    );
    mesh.position.set(...pos);
    // Orientación inicial aleatoria pero determinista
    mesh.rotation.set(i * 0.9, i * 1.4, i * 0.6);
    scene.add(mesh);
    return mesh;
  });

  // ── CARGA DE TEXTURA ─────────────────────────────────────
  // Aplica una textura cargada desde un src (data URL o ruta HTTP)
  function applyTexture(src) {
    const img  = new Image();
    img.onload = () => {
      const tex = new THREE.Texture(img);
      tex.colorSpace      = THREE.SRGBColorSpace;
      tex.minFilter       = THREE.LinearMipmapLinearFilter;
      tex.magFilter       = THREE.LinearFilter;
      tex.anisotropy      = renderer.capabilities.getMaxAnisotropy();
      tex.generateMipmaps = true;
      tex.needsUpdate     = true;

      worldMat = new THREE.MeshToonMaterial({
        map:         tex,
        gradientMap: rampTex,
        flatShading: true,
      });
      world.material = worldMat;

      // Ocultar el picker
      document.getElementById('picker').classList.remove('show');
    };
    img.src = src;
  }

  if (window._isFile) {
    // file:// — el picker ya es visible; FileReader produce un data URL libre de CORS
    document.getElementById('finput').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => applyTexture(ev.target.result);
      reader.readAsDataURL(file);
    });
  } else {
    // HTTP — carga directa con TextureLoader
    new THREE.TextureLoader().load(
      'image.jpg',
      tex => {
        tex.colorSpace  = THREE.SRGBColorSpace;
        tex.anisotropy  = renderer.capabilities.getMaxAnisotropy();
        worldMat = new THREE.MeshToonMaterial({
          map: tex, gradientMap: rampTex, flatShading: true,
        });
        world.material = worldMat;
      }
    );
  }

  // ── RESIZE ───────────────────────────────────────────────
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  });

  // ── ANIMACIÓN ────────────────────────────────────────────
  const clock = new THREE.Clock();

  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Mundo: rotación lenta en Y + flotación senoidal en Y
    world.rotation.y     = t * 0.18;
    worldPivot.position.y = Math.sin(t * 0.45) * 0.14;

    // Anillos contra-rotan levemente para dar vida
    ring1.rotation.z =  t * 0.05;
    ring2.rotation.y =  t * 0.04;

    // Rocas: giran y flotan con fase distinta cada una
    rocks.forEach((rock, i) => {
      rock.rotation.x += 0.006;
      rock.rotation.y += 0.009;
      // Flotación independiente de la del mundo
      rock.position.y  = rockDefs[i].pos[1] + Math.sin(t * 0.55 + i * 1.1) * 0.12;
    });

    controls.update();
    renderer.render(scene, camera);
  }

  animate();
</script>
</body>
</html>
