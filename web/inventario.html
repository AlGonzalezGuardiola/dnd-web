<!DOCTYPE html>
<html lang="es">
<head>
    <base id="appBase" href="/dnd-web/web/">
    <script>
    (function(){
        var h = location.hostname;
        if (h === 'localhost' || h === '127.0.0.1' || h === '') {
            document.getElementById('appBase').href = '/';
        }
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso de Hermione — DnD</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ── Reset & Base ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary:   #05080f;
            --bg-panel:     #0c1020;
            --bg-card:      #0f1627;
            --bg-glass:     rgba(8,12,24,0.88);
            --gold:         #c9a227;
            --gold-bright:  #f0c040;
            --gold-dim:     rgba(201,162,39,0.18);
            --gold-border:  rgba(201,162,39,0.30);
            --gold-glow:    rgba(201,162,39,0.22);
            --text-primary: #e8dcc8;
            --text-secondary: #9ba3b5;
            --text-muted:   #5a6478;
            --border:       rgba(201,162,39,0.22);
            --border-hover: rgba(201,162,39,0.55);
            --danger:       rgba(200,50,50,0.8);
            --font-heading: 'Cinzel', serif;
            --font-display: 'Cormorant Garamond', serif;
            --font-body:    'Inter', sans-serif;
            --ease-out:     cubic-bezier(0.22, 1, 0.36, 1);
        }

        html { height: 100%; }

        body {
            font-family: var(--font-body);
            background:
                radial-gradient(ellipse at 15% 40%, rgba(139,26,26,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 20%, rgba(124,58,237,0.06) 0%, transparent 50%),
                linear-gradient(160deg, #05080f 0%, #0d1120 50%, #060a14 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Stars */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1.5px 1.5px at 15% 25%, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 55% 65%, rgba(255,255,255,0.4), transparent),
                radial-gradient(2px 2px at 80% 10%, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 35% 80%, rgba(255,255,255,0.3), transparent),
                radial-gradient(1.5px 1.5px at 70% 50%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 90% 75%, rgba(255,255,255,0.3), transparent);
            background-size: 300% 300%;
            animation: twinkle 9s ease-in-out infinite;
            opacity: 0.55;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.35; }
            50%       { opacity: 0.65; }
        }

        /* ── Layout ── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* ── Header ── */
        .inv-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 28px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }
        .inv-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.04);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 18px;
            transition: border-color 0.2s, background 0.2s, color 0.2s;
            flex-shrink: 0;
        }
        .inv-back:hover {
            border-color: var(--gold);
            background: var(--gold-dim);
            color: var(--gold);
        }
        .inv-title-wrap { flex: 1; }
        .inv-title {
            font-family: var(--font-heading);
            font-size: clamp(22px, 4vw, 34px);
            font-weight: 600;
            letter-spacing: 0.04em;
            background: linear-gradient(135deg, #f0c040 0%, #c9a227 50%, #a07820 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .inv-subtitle {
            font-family: var(--font-display);
            font-size: 14px;
            font-style: italic;
            color: var(--text-muted);
            margin-top: 3px;
            letter-spacing: 0.06em;
        }
        .inv-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }
        .inv-count {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
        }
        .inv-count-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .inv-save-status {
            font-size: 11px;
            color: var(--text-muted);
            font-style: italic;
            min-height: 14px;
            text-align: right;
        }

        /* ── Add form ── */
        .add-card {
            background: linear-gradient(135deg, rgba(201,162,39,0.07) 0%, rgba(12,16,32,0.95) 100%);
            border: 1px solid var(--gold-border);
            border-radius: 14px;
            padding: 20px 22px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
        }
        .add-card-title {
            font-family: var(--font-heading);
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 14px;
        }
        .add-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }
        .add-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 11px 14px;
            font-size: 14px;
            font-family: var(--font-body);
            transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
            min-width: 0;
        }
        .add-input::placeholder { color: var(--text-muted); }
        .add-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(201,162,39,0.06);
            box-shadow: 0 0 0 3px rgba(201,162,39,0.12);
        }
        .add-qty {
            flex: 0 0 88px;
            text-align: center;
        }
        .btn-add {
            padding: 11px 22px;
            background: linear-gradient(135deg, rgba(201,162,39,0.28) 0%, rgba(160,120,32,0.18) 100%);
            border: 1px solid var(--gold-border);
            border-radius: 8px;
            color: var(--gold-bright);
            font-family: var(--font-body);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            white-space: nowrap;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, rgba(201,162,39,0.42) 0%, rgba(160,120,32,0.28) 100%);
            border-color: var(--gold);
            box-shadow: 0 4px 20px rgba(201,162,39,0.25);
            transform: translateY(-1px);
        }
        .btn-add:active { transform: scale(0.97); }

        /* ── Search & toolbar ── */
        .toolbar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        .search-wrap {
            position: relative;
            flex: 1;
        }
        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            pointer-events: none;
        }
        .search-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-primary);
            padding: 10px 12px 10px 36px;
            font-size: 14px;
            font-family: var(--font-body);
            transition: border-color 0.18s, background 0.18s;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(201,162,39,0.04);
        }
        .sort-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text-secondary);
            padding: 10px 12px;
            font-size: 13px;
            font-family: var(--font-body);
            cursor: pointer;
        }
        .sort-select:focus { outline: none; border-color: var(--gold); }

        /* ── Item grid ── */
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 14px;
        }

        .item-card {
            position: relative;
            background: linear-gradient(160deg, rgba(18,22,40,0.95) 0%, rgba(10,14,26,0.98) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 18px 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
            animation: cardIn 0.28s var(--ease-out) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .item-card:hover {
            border-color: var(--gold-border);
            box-shadow: 0 8px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,162,39,0.1);
            transform: translateY(-2px);
        }

        .item-del {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.18s, background 0.18s, color 0.18s;
        }
        .item-card:hover .item-del { opacity: 1; }
        .item-del:hover {
            background: rgba(200,50,50,0.18);
            color: #ff6666;
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1.3;
            padding-right: 20px;
            word-break: break-word;
        }

        .item-qty-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .item-qty-num {
            font-family: var(--font-display);
            font-size: 42px;
            font-weight: 600;
            color: var(--gold);
            line-height: 1;
            letter-spacing: -0.02em;
            text-shadow: 0 0 20px rgba(201,162,39,0.3);
        }
        .item-qty-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }
        .item-qty-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            width: 100%;
        }
        .qty-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.14);
            background: rgba(255,255,255,0.06);
            color: var(--text-primary);
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            line-height: 1;
            flex-shrink: 0;
        }
        .qty-btn:hover {
            background: rgba(201,162,39,0.2);
            border-color: var(--gold);
        }
        .qty-btn:active { transform: scale(0.9); }
        .qty-input {
            flex: 1;
            text-align: center;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            color: var(--text-primary);
            font-family: var(--font-display);
            font-size: 16px;
            font-weight: 600;
            padding: 5px 4px;
            transition: border-color 0.15s;
        }
        .qty-input:focus {
            outline: none;
            border-color: var(--gold);
        }

        /* ── Empty state ── */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .empty-icon {
            font-size: 56px;
            opacity: 0.35;
            line-height: 1;
        }
        .empty-title {
            font-family: var(--font-heading);
            font-size: 18px;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }
        .empty-sub {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            opacity: 0.7;
        }

        /* ── Loading skeleton ── */
        .skeleton-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            height: 160px;
            animation: shimmer 1.6s infinite;
            background: linear-gradient(
                90deg,
                rgba(255,255,255,0.03) 25%,
                rgba(255,255,255,0.07) 50%,
                rgba(255,255,255,0.03) 75%
            );
            background-size: 200% 100%;
        }
        @keyframes shimmer {
            0%   { background-position: -200% 0; }
            100% { background-position:  200% 0; }
        }

        /* ── Save status snack ── */
        .snack {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(60px);
            background: rgba(12,16,30,0.95);
            border: 1px solid var(--gold-border);
            border-radius: 24px;
            padding: 9px 20px;
            font-size: 13px;
            color: var(--gold);
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            transition: transform 0.3s var(--ease-out), opacity 0.3s;
            opacity: 0;
            z-index: 100;
            white-space: nowrap;
        }
        .snack.visible {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .inv-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            .add-row { flex-wrap: wrap; }
            .add-qty { flex: 0 0 70px; }
            .btn-add { width: 100%; justify-content: center; }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: rgba(201,162,39,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }

        /* ── Divider ── */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin: 8px 0 20px;
        }
    </style>
</head>
<body>
    <div class="page">

        <!-- Header -->
        <header class="inv-header">
            <a href="index.html" class="inv-back" title="Volver">←</a>
            <div class="inv-title-wrap">
                <h1 class="inv-title">Bolso de Hermione</h1>
                <p class="inv-subtitle">Inventario del grupo · Todo cabe aquí dentro</p>
            </div>
            <div class="inv-meta">
                <span class="inv-count" id="itemCount">—</span>
                <span class="inv-count-label">objetos</span>
                <span class="inv-save-status" id="saveStatus"></span>
            </div>
        </header>

        <!-- Add form -->
        <div class="add-card">
            <div class="add-card-title">✦ Añadir objeto</div>
            <div class="add-row">
                <input type="text" id="addName" class="add-input" placeholder="Nombre del objeto…" maxlength="80"
                    onkeydown="if(event.key==='Enter') addItem()">
                <input type="number" id="addQty" class="add-input add-qty" placeholder="Cant." min="1" value="1"
                    onkeydown="if(event.key==='Enter') addItem()">
                <button class="btn-add" onclick="addItem()">+ Añadir</button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-wrap">
                <span class="search-icon">⌕</span>
                <input type="text" id="searchInput" class="search-input" placeholder="Buscar objeto…" oninput="renderGrid()">
            </div>
            <select id="sortSelect" class="sort-select" onchange="renderGrid()">
                <option value="name">A → Z</option>
                <option value="name-desc">Z → A</option>
                <option value="qty-desc">Mayor cantidad</option>
                <option value="qty-asc">Menor cantidad</option>
                <option value="recent">Más reciente</option>
            </select>
        </div>

        <div class="section-divider"></div>

        <!-- Item grid -->
        <div class="inv-grid" id="invGrid">
            <!-- skeletons while loading -->
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

    </div>

    <!-- Snack toast -->
    <div class="snack" id="snack"></div>

    <script>
    // ── Config ──
    const CHAR_ID = '__bolso_hermione__';
    const BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
        ? 'http://localhost:3001'
        : location.origin;

    // ── State ──
    let items = [];       // [{ id, nombre, cantidad, ts }]
    let saveTimer = null;
    let snackTimer = null;

    // ── Boot ──
    window.addEventListener('DOMContentLoaded', load);

    async function load() {
        try {
            const res  = await fetch(`${BASE_URL}/api/player-characters`);
            const json = await res.json();
            const entry = (json.characters || []).find(c => c.charId === CHAR_ID);
            items = entry?.data?.items ?? [];
        } catch(e) {
            items = [];
            showSnack('Error al cargar el inventario');
        }
        renderGrid();
    }

    // ── Render ──
    function renderGrid() {
        const grid   = document.getElementById('invGrid');
        const query  = document.getElementById('searchInput').value.toLowerCase();
        const sort   = document.getElementById('sortSelect').value;

        let filtered = query
            ? items.filter(it => it.nombre.toLowerCase().includes(query))
            : [...items];

        if (sort === 'name')      filtered.sort((a,b) => a.nombre.localeCompare(b.nombre));
        if (sort === 'name-desc') filtered.sort((a,b) => b.nombre.localeCompare(a.nombre));
        if (sort === 'qty-desc')  filtered.sort((a,b) => b.cantidad - a.cantidad);
        if (sort === 'qty-asc')   filtered.sort((a,b) => a.cantidad - b.cantidad);
        if (sort === 'recent')    filtered.sort((a,b) => (b.ts||0) - (a.ts||0));

        // Count
        document.getElementById('itemCount').textContent = items.length;

        if (!filtered.length) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">👜</div>
                    <div class="empty-title">${query ? 'Ningún objeto coincide' : 'El bolso está vacío'}</div>
                    <div class="empty-sub">${query ? 'Prueba otra búsqueda' : 'Añade el primer objeto usando el formulario de arriba'}</div>
                </div>`;
            return;
        }

        grid.innerHTML = filtered.map(it => `
            <div class="item-card" id="card-${it.id}">
                <button class="item-del" onclick="deleteItem('${it.id}')" title="Eliminar objeto" aria-label="Eliminar ${esc(it.nombre)}">✕</button>
                <div class="item-name">${esc(it.nombre)}</div>
                <div class="item-qty-section">
                    <div class="item-qty-num" id="num-${it.id}">${it.cantidad}</div>
                    <div class="item-qty-label">unidades</div>
                    <div class="item-qty-controls">
                        <button class="qty-btn" onclick="changeQty('${it.id}',-1)" aria-label="Reducir cantidad">−</button>
                        <input class="qty-input" type="number" min="0" value="${it.cantidad}"
                            onchange="setQty('${it.id}',this.value)"
                            onclick="this.select()"
                            aria-label="Cantidad de ${esc(it.nombre)}">
                        <button class="qty-btn" onclick="changeQty('${it.id}',1)" aria-label="Aumentar cantidad">+</button>
                    </div>
                </div>
            </div>`).join('');
    }

    // ── Mutations ──
    function addItem() {
        const nameEl = document.getElementById('addName');
        const qtyEl  = document.getElementById('addQty');
        const nombre   = nameEl.value.trim();
        const cantidad = Math.max(1, parseInt(qtyEl.value) || 1);
        if (!nombre) { nameEl.focus(); return; }

        const existing = items.find(it => it.nombre.toLowerCase() === nombre.toLowerCase());
        if (existing) {
            existing.cantidad += cantidad;
        } else {
            items = [{ id: `i${Date.now()}`, nombre, cantidad, ts: Date.now() }, ...items];
        }

        nameEl.value = '';
        qtyEl.value  = 1;
        nameEl.focus();
        renderGrid();
        scheduleSave();
    }

    function changeQty(id, delta) {
        const it = items.find(i => i.id === id);
        if (!it) return;
        const next = it.cantidad + delta;
        if (next <= 0) { deleteItem(id); return; }
        it.cantidad = next;
        // Update DOM without full re-render for snappiness
        const numEl = document.getElementById(`num-${id}`);
        const card  = document.getElementById(`card-${id}`);
        if (numEl) numEl.textContent = next;
        if (card) {
            const inp = card.querySelector('.qty-input');
            if (inp) inp.value = next;
        }
        scheduleSave();
    }

    function setQty(id, raw) {
        const val = parseInt(raw);
        if (isNaN(val) || val < 0) return;
        if (val === 0) { deleteItem(id); return; }
        const it = items.find(i => i.id === id);
        if (it) it.cantidad = val;
        const numEl = document.getElementById(`num-${id}`);
        if (numEl) numEl.textContent = val;
        scheduleSave();
    }

    function deleteItem(id) {
        const card = document.getElementById(`card-${id}`);
        if (card) {
            card.style.transition = 'opacity 0.2s, transform 0.2s';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.92)';
            setTimeout(() => {
                items = items.filter(i => i.id !== id);
                renderGrid();
                scheduleSave();
            }, 200);
        }
    }

    // ── Persistence ──
    function scheduleSave() {
        clearTimeout(saveTimer);
        setSaveStatus('Guardando…');
        saveTimer = setTimeout(save, 800);
    }

    async function save() {
        try {
            await fetch(`${BASE_URL}/api/player-characters/${CHAR_ID}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ data: { items } }),
            });
            setSaveStatus('Guardado ✓');
            setTimeout(() => setSaveStatus(''), 2500);
        } catch(e) {
            setSaveStatus('Error al guardar');
        }
    }

    function setSaveStatus(msg) {
        document.getElementById('saveStatus').textContent = msg;
    }

    function showSnack(msg, duration = 3500) {
        const el = document.getElementById('snack');
        el.textContent = msg;
        el.classList.add('visible');
        clearTimeout(snackTimer);
        snackTimer = setTimeout(() => el.classList.remove('visible'), duration);
    }

    // ── Utils ──
    function esc(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    </script>
</body>
</html>
