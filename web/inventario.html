<!DOCTYPE html>
<html lang="es">
<head>
    <base id="appBase" href="/dnd-web/web/">
    <script>
    (function(){
        var h = location.hostname;
        if (h === 'localhost' || h === '127.0.0.1' || h === '') {
            document.getElementById('appBase').href = '/';
        }
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolso de Hermione</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
    /* ─── Reset ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    /* ─── Tokens ─────────────────────────────────── */
    :root {
        --bg:          #06090f;
        --surface:     rgba(14,18,32,0.96);
        --surface2:    rgba(18,22,38,0.92);
        --gold:        #c9a227;
        --gold-bright: #f0c040;
        --gold-dim:    rgba(201,162,39,0.14);
        --gold-line:   rgba(201,162,39,0.22);
        --gold-glow:   rgba(201,162,39,0.25);
        --text:        #e8dcc8;
        --text-2:      #9ba3b5;
        --text-3:      #505870;
        --danger:      rgba(190,50,50,0.85);
        --ease:        cubic-bezier(0.22,1,0.36,1);
        --font-title:  'Cinzel', serif;
        --font-body:   'Inter', sans-serif;
        --font-nums:   'Cormorant Garamond', serif;
    }

    /* ─── Background ────────────────────────────── */
    body {
        font-family: var(--font-body);
        background:
            radial-gradient(ellipse at 20% 60%, rgba(139,26,26,0.08) 0%, transparent 55%),
            radial-gradient(ellipse at 80% 15%, rgba(80,40,180,0.07) 0%, transparent 50%),
            linear-gradient(170deg, #05080f 0%, #0d1120 55%, #060a14 100%);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
    }
    body::before {
        content: '';
        position: fixed; inset: 0; pointer-events: none; z-index: 0;
        background-image:
            radial-gradient(1.5px 1.5px at 12% 22%, rgba(255,255,255,.55), transparent),
            radial-gradient(1px 1px   at 58% 68%, rgba(255,255,255,.35), transparent),
            radial-gradient(2px 2px   at 82% 12%, rgba(255,255,255,.45), transparent),
            radial-gradient(1px 1px   at 30% 82%, rgba(255,255,255,.30), transparent),
            radial-gradient(1.5px 1.5px at 72% 48%, rgba(255,255,255,.40), transparent),
            radial-gradient(1px 1px   at 92% 78%, rgba(255,255,255,.30), transparent);
        background-size: 300% 300%;
        animation: twinkle 9s ease-in-out infinite;
    }
    @keyframes twinkle {
        0%,100% { opacity: .35; }
        50%     { opacity: .65; }
    }

    /* ─── Layout ─────────────────────────────────── */
    .page {
        position: relative; z-index: 1;
        max-width: 780px;
        margin: 0 auto;
        padding: 0 18px 100px;
    }

    /* ─── Header ─────────────────────────────────── */
    .hdr {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 26px 0 22px;
        border-bottom: 1px solid var(--gold-line);
        margin-bottom: 28px;
    }
    .btn-back {
        width: 36px; height: 36px; border-radius: 50%;
        border: 1px solid var(--gold-line);
        background: rgba(255,255,255,.04);
        color: var(--text-2); font-size: 17px;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        text-decoration: none;
        transition: border-color .2s, background .2s, color .2s;
        flex-shrink: 0;
    }
    .btn-back:hover { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }

    .hdr-titles { flex: 1; min-width: 0; }
    .hdr-title {
        font-family: var(--font-title);
        font-size: clamp(20px, 3.5vw, 30px);
        font-weight: 600;
        letter-spacing: .04em;
        background: linear-gradient(130deg, #f0c040 0%, #c9a227 55%, #9a7220 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.1;
    }
    .hdr-sub {
        font-family: var(--font-nums);
        font-style: italic;
        font-size: 13px;
        color: var(--text-3);
        margin-top: 2px;
        letter-spacing: .06em;
    }

    .hdr-right { text-align: right; flex-shrink: 0; }
    .hdr-count {
        font-family: var(--font-nums);
        font-size: 30px; font-weight: 600;
        color: var(--gold); line-height: 1;
    }
    .hdr-count-lbl { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .1em; }
    .save-status { font-size: 11px; color: var(--text-3); font-style: italic; min-height: 15px; margin-top: 2px; }

    /* ─── Add form ───────────────────────────────── */
    .add-panel {
        background: linear-gradient(135deg, rgba(201,162,39,.07) 0%, rgba(12,16,30,.96) 100%);
        border: 1px solid var(--gold-line);
        border-radius: 14px;
        padding: 18px 20px 20px;
        margin-bottom: 22px;
        box-shadow: 0 6px 30px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04);
    }
    .add-panel-label {
        font-family: var(--font-title);
        font-size: 10px; letter-spacing: .16em;
        text-transform: uppercase; color: var(--gold);
        margin-bottom: 14px;
    }

    .add-main-row {
        display: flex;
        gap: 8px;
        align-items: flex-start;
    }
    .add-desc-row {
        margin-top: 8px;
        display: flex;
        gap: 8px;
    }
    .inp-desc {
        flex: 1;
        resize: none;
        height: 56px;
        line-height: 1.45;
        font-size: 13px;
    }
    .inp-cat {
        flex: 0 0 160px;
        cursor: pointer;
        font-size: 13px;
    }
    .add-cat-col {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 0 0 160px;
    }
    .edit-cat-col {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }

    /* ─── Category sections ──────────────────────── */
    .cat-section { margin-bottom: 20px; }
    .cat-hdr {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 8px 10px;
        cursor: pointer;
        user-select: none;
        border-radius: 8px;
        transition: background .15s;
    }
    .cat-hdr:hover { background: rgba(201,162,39,.05); }
    .cat-chevron {
        font-size: 11px; color: var(--gold); flex-shrink: 0;
        transition: transform .22s var(--ease);
        transform: rotate(90deg);
        display: inline-block; line-height: 1;
    }
    .cat-chevron.collapsed { transform: rotate(0deg); }
    .cat-hdr-icon { font-size: 18px; line-height: 1; }
    .cat-hdr-label {
        font-family: var(--font-title);
        font-size: 12px; letter-spacing: .12em;
        text-transform: uppercase; color: var(--gold);
    }
    .cat-hdr-line { flex: 1; height: 1px; background: var(--gold-line); }
    .cat-hdr-count {
        font-family: var(--font-nums);
        font-size: 13px; color: var(--text-3);
        font-style: italic;
    }

    /* ─── Edit button ────────────────────────────── */
    .item-edit-btn {
        width: 28px; height: 28px; border-radius: 50%;
        border: 1px solid rgba(255,255,255,.1);
        background: rgba(255,255,255,.04);
        color: var(--text-3); font-size: 13px;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        flex-shrink: 0; opacity: 0;
        transition: opacity .18s, background .18s, color .18s, border-color .18s;
    }
    .item-row:hover .item-edit-btn { opacity: 1; }
    .item-edit-btn:hover { background: rgba(201,162,39,.18); border-color: var(--gold); color: var(--gold); }

    /* ─── Edit form (inline) ─────────────────────── */
    .item-row--editing {
        background: rgba(201,162,39,.06) !important;
        border-color: var(--gold-line) !important;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
        padding: 14px 16px;
    }
    .edit-row { display: flex; gap: 8px; align-items: stretch; }
    .edit-inp-name { flex: 1; min-width: 0; }
    .edit-inp-qty  { width: 80px; text-align: center; flex-shrink: 0; }
    .edit-inp-cat  { flex: 0 0 160px; cursor: pointer; }
    .edit-inp-desc { width: 100%; resize: none; height: 56px; line-height: 1.45; font-size: 13px; }
    .edit-actions  { display: flex; gap: 8px; justify-content: flex-end; }
    .edit-save-btn {
        padding: 8px 18px;
        background: linear-gradient(135deg, rgba(201,162,39,.30) 0%, rgba(160,120,32,.18) 100%);
        border: 1px solid var(--gold-line); border-radius: 7px;
        color: var(--gold-bright); font-family: var(--font-body);
        font-size: 13px; font-weight: 600; cursor: pointer;
        transition: background .2s, box-shadow .2s;
    }
    .edit-save-btn:hover { background: rgba(201,162,39,.42); box-shadow: 0 3px 14px rgba(201,162,39,.22); }
    .edit-cancel-btn {
        padding: 8px 14px;
        background: transparent; border: 1px solid rgba(255,255,255,.12);
        border-radius: 7px; color: var(--text-2);
        font-family: var(--font-body); font-size: 13px; cursor: pointer;
        transition: border-color .15s, color .15s;
    }
    .edit-cancel-btn:hover { border-color: rgba(255,255,255,.28); color: var(--text); }

    /* ─── Media widget (photo / emoji toggle) ───── */
    .add-media-widget,
    .edit-media-widget {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        flex-shrink: 0;
    }
    .media-tabs {
        display: flex;
        gap: 2px;
        background: rgba(255,255,255,.06);
        border-radius: 6px;
        padding: 2px;
    }
    .mtab {
        width: 22px; height: 22px;
        border: none;
        background: transparent;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .15s;
        line-height: 1;
    }
    .mtab.active { background: rgba(201,162,39,.28); }
    .mtab:hover:not(.active) { background: rgba(255,255,255,.09); }

    /* image picker */
    .add-img-btn {
        width: 48px; height: 48px;
        border-radius: 10px;
        border: 1px dashed rgba(201,162,39,.35);
        background: rgba(201,162,39,.06);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
        position: relative;
        transition: border-color .2s, background .2s;
    }
    .add-img-btn:hover { border-color: var(--gold); background: rgba(201,162,39,.14); }
    .add-img-btn img {
        width: 100%; height: 100%; object-fit: cover;
        position: absolute; inset: 0; border-radius: 9px;
    }
    .add-img-icon { font-size: 20px; color: var(--text-3); pointer-events: none; }
    #addImgInput { display: none; }

    /* emoji input (shared by add form and edit form) */
    .add-emoji-inp {
        width: 48px; height: 48px;
        text-align: center;
        font-size: 26px;
        padding: 4px 2px;
        border-radius: 10px;
        cursor: text;
        line-height: 1;
        display: none;
    }
    .emoji-thumb-display { font-size: 26px; line-height: 1; }

    .add-fields { flex: 1; display: flex; gap: 8px; min-width: 0; }
    .inp {
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.11);
        border-radius: 8px;
        color: var(--text);
        padding: 11px 12px;
        font-size: 14px;
        font-family: var(--font-body);
        transition: border-color .18s, background .18s, box-shadow .18s;
        min-width: 0;
    }
    .inp::placeholder { color: var(--text-3); }
    .inp:focus { outline: none; border-color: var(--gold); background: rgba(201,162,39,.05); box-shadow: 0 0 0 3px rgba(201,162,39,.11); }
    .inp-name { flex: 1; }
    .inp-qty  { width: 80px; text-align: center; flex-shrink: 0; }
    .btn-add {
        padding: 11px 18px;
        background: linear-gradient(135deg, rgba(201,162,39,.28) 0%, rgba(160,120,32,.16) 100%);
        border: 1px solid var(--gold-line);
        border-radius: 8px;
        color: var(--gold-bright);
        font-family: var(--font-body);
        font-size: 13px; font-weight: 600;
        cursor: pointer; white-space: nowrap; flex-shrink: 0;
        transition: background .2s, border-color .2s, box-shadow .2s, transform .12s;
    }
    .btn-add:hover {
        background: linear-gradient(135deg, rgba(201,162,39,.42) 0%, rgba(160,120,32,.28) 100%);
        border-color: var(--gold);
        box-shadow: 0 4px 18px rgba(201,162,39,.24);
        transform: translateY(-1px);
    }
    .btn-add:active { transform: scale(.97); }

    /* ─── Toolbar ────────────────────────────────── */
    .toolbar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
    .search-wrap { position: relative; flex: 1; }
    .search-ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 15px; pointer-events: none; }
    .search-inp {
        width: 100%;
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 8px; color: var(--text);
        padding: 9px 10px 9px 34px;
        font-size: 13px; font-family: var(--font-body);
        transition: border-color .18s, background .18s;
    }
    .search-inp::placeholder { color: var(--text-3); }
    .search-inp:focus { outline: none; border-color: var(--gold); background: rgba(201,162,39,.04); }
    .sort-sel {
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.09);
        border-radius: 8px; color: var(--text-2);
        padding: 9px 10px; font-size: 12px;
        font-family: var(--font-body); cursor: pointer;
        flex-shrink: 0;
    }
    .sort-sel:focus { outline: none; border-color: var(--gold); }

    /* ─── Item list ──────────────────────────────── */
    .inv-list {
        display: flex;
        flex-direction: column;
        gap: 0;
        background: linear-gradient(160deg, rgba(14,18,32,.96) 0%, rgba(10,13,24,.98) 100%);
        border: 1px solid rgba(255,255,255,.07);
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 8px 40px rgba(0,0,0,.5);
    }

    .item-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 13px 16px;
        border-bottom: 1px solid rgba(255,255,255,.05);
        transition: background .18s;
        animation: rowIn .24s var(--ease) both;
        position: relative;
    }
    @keyframes rowIn {
        from { opacity: 0; transform: translateX(-8px); }
        to   { opacity: 1; transform: translateX(0); }
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: rgba(201,162,39,.05); }

    /* thumbnail */
    .item-thumb {
        width: 44px; height: 44px; border-radius: 8px;
        flex-shrink: 0; overflow: hidden;
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.08);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; color: var(--text-3);
        cursor: pointer;
        transition: border-color .2s;
        position: relative;
    }
    .item-thumb:hover { border-color: var(--gold); }
    .item-thumb img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .item-thumb-input { display: none; }

    /* name */
    .item-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); min-width: 0; word-break: break-word; line-height: 1.35; }

    /* stepper */
    .item-stepper { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
    .step-btn {
        width: 28px; height: 28px; border-radius: 50%;
        border: 1px solid rgba(255,255,255,.13);
        background: rgba(255,255,255,.06);
        color: var(--text); font-size: 16px;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        transition: background .15s, border-color .15s, transform .1s;
        line-height: 1; flex-shrink: 0;
    }
    .step-btn:hover { background: rgba(201,162,39,.22); border-color: var(--gold); }
    .step-btn:active { transform: scale(.88); }
    .step-qty {
        font-family: var(--font-nums);
        font-size: 18px; font-weight: 600;
        color: var(--gold);
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 7px;
        text-align: center;
        padding: 3px 6px;
        min-width: 52px;
        width: auto;
        max-width: 90px;
        transition: border-color .15s;
    }
    .step-qty:focus { outline: none; border-color: var(--gold); }

    /* info button */
    .item-info {
        width: 28px; height: 28px; border-radius: 50%;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.05);
        color: var(--text-3); font-size: 13px; font-weight: 600;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: border-color .18s, background .18s, color .18s;
        font-style: italic; font-family: Georgia, serif;
        line-height: 1;
    }
    .item-info:hover,
    .item-info.active {
        border-color: var(--gold);
        background: rgba(201,162,39,.16);
        color: var(--gold);
    }

    /* ─── Info dialog (native <dialog>) ─────────── */
    #infoDialog {
        position: fixed;
        margin: 0;
        padding: 0;
        border: none;
        background: transparent;
        width: min(300px, calc(100vw - 24px));
        overflow: visible;
    }
    #infoDialog::backdrop {
        background: transparent;
    }
    .dialog-inner-wrap {
        background: linear-gradient(155deg, rgba(16,20,40,.99) 0%, rgba(10,13,26,1) 100%);
        border: 1px solid var(--gold-line);
        border-radius: 12px;
        box-shadow: 0 12px 40px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.04);
        padding: 14px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        animation: popIn .15s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes popIn {
        from { opacity: 0; transform: scale(.93) translateY(-6px); }
        to   { opacity: 1; transform: none; }
    }
    .dialog-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
    }
    .dialog-name {
        font-family: var(--font-title);
        font-size: 11px; letter-spacing: .1em;
        color: var(--gold); text-transform: uppercase;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        flex: 1;
    }
    .dialog-close-btn {
        width: 24px; height: 24px; border-radius: 50%;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(255,255,255,.05);
        color: var(--text-3); font-size: 13px;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        flex-shrink: 0;
        transition: background .15s, color .15s;
        line-height: 1;
    }
    .dialog-close-btn:hover { background: rgba(255,255,255,.14); color: var(--text); }
    .dialog-desc {
        background: rgba(255,255,255,.05);
        border: 1px solid rgba(255,255,255,.11);
        border-radius: 8px;
        color: var(--text);
        font-family: var(--font-body);
        font-size: 13px; line-height: 1.55;
        padding: 9px 11px;
        resize: none; height: 90px; width: 100%;
        transition: border-color .15s;
    }
    .dialog-desc[readonly] { cursor: default; color: var(--text-2); }
    .dialog-desc:focus { outline: none; }
    .dialog-hint { font-size: 11px; color: var(--text-3); font-style: italic; }

    /* delete */
    .item-del {
        width: 28px; height: 28px; border-radius: 50%;
        border: none; background: transparent;
        color: var(--text-3); font-size: 14px;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        opacity: 0; flex-shrink: 0;
        transition: opacity .18s, background .18s, color .18s;
    }
    .item-row:hover .item-del { opacity: 1; }
    .item-del:hover { background: rgba(190,50,50,.18); color: #ff7777; }

    /* ─── Empty / loading ────────────────────────── */
    .empty {
        padding: 64px 24px; text-align: center;
        display: flex; flex-direction: column;
        align-items: center; gap: 12px;
    }
    .empty-ico  { font-size: 52px; opacity: .3; }
    .empty-title { font-family: var(--font-title); font-size: 16px; color: var(--text-3); letter-spacing: .05em; }
    .empty-hint  { font-size: 13px; color: var(--text-3); font-style: italic; opacity: .7; }

    .skel-row {
        height: 72px;
        background: linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.07) 50%, rgba(255,255,255,.03) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .skel-row:last-child { border-bottom: none; }
    @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

    /* ─── Snack ──────────────────────────────────── */
    .snack {
        position: fixed; bottom: 22px; left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: rgba(10,14,28,.95);
        border: 1px solid var(--gold-line);
        border-radius: 20px;
        padding: 8px 18px; font-size: 13px;
        color: var(--gold);
        backdrop-filter: blur(10px);
        box-shadow: 0 6px 24px rgba(0,0,0,.5);
        transition: transform .28s var(--ease), opacity .28s;
        opacity: 0; z-index: 100; white-space: nowrap;
    }
    .snack.on { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ─── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(201,162,39,.2); border-radius: 2px; }

    /* ─── Lightbox ──────────────────────────────── */
    #lightboxDialog {
        border: none;
        background: transparent;
        padding: 0;
        margin: auto;
        max-width: 100vw;
        max-height: 100vh;
        overflow: visible;
    }
    #lightboxDialog::backdrop {
        background: rgba(0,0,0,.88);
        backdrop-filter: blur(6px);
    }
    #lightboxImg {
        display: block;
        max-width: min(90vw, 700px);
        max-height: 85vh;
        border-radius: 10px;
        box-shadow: 0 24px 80px rgba(0,0,0,.8);
        object-fit: contain;
    }
    #lightboxClose {
        position: fixed;
        top: 18px; right: 18px;
        width: 38px; height: 38px;
        border-radius: 50%;
        border: 1px solid rgba(255,255,255,.22);
        background: rgba(10,12,24,.85);
        color: var(--text-2); font-size: 16px;
        cursor: pointer; display: flex;
        align-items: center; justify-content: center;
        transition: background .15s, color .15s;
        backdrop-filter: blur(8px);
    }
    #lightboxClose:hover { background: rgba(255,255,255,.12); color: var(--text); }

    /* ─── Responsive / Mobile ───────────────────── */
    @media (max-width: 560px) {
        .page { padding: 0 12px 80px; }

        /* Header */
        .hdr { padding: 18px 0 16px; margin-bottom: 18px; gap: 10px; }
        .hdr-sub { display: none; }
        .hdr-count { font-size: 24px; }

        /* Add form */
        .add-panel { padding: 14px 14px 16px; margin-bottom: 16px; }
        .add-main-row { flex-direction: column; gap: 10px; }
        .add-media-widget { flex-direction: row; align-items: center; gap: 8px; width: 100%; }
        .add-img-btn { width: 52px; height: 52px; border-radius: 8px; flex-shrink: 0; }
        .add-emoji-inp { width: 52px; height: 52px; border-radius: 8px; }
        .add-fields { flex-direction: column; }
        .inp-qty { width: 100%; text-align: left; }
        .btn-add { width: 100%; justify-content: center; display: flex; }
        .add-desc-row { flex-direction: column; }
        .inp-cat { flex: none; width: 100%; }
        .inp-desc { height: 48px; }

        /* Toolbar */
        .toolbar { flex-wrap: wrap; }
        .search-wrap { min-width: 0; }
        .sort-sel { flex: 1; }

        /* Item rows — two-line layout */
        .item-row {
            flex-wrap: wrap;
            gap: 8px;
            padding: 11px 12px;
            row-gap: 8px;
        }
        .item-thumb { width: 38px; height: 38px; }
        .item-name { font-size: 13px; }

        /* Always show edit + delete on touch (no hover) */
        .item-edit-btn { opacity: 1; }
        .item-del      { opacity: 1; }

        /* Action buttons row: push to right side of name line */
        .item-info,
        .item-edit-btn,
        .item-del { width: 32px; height: 32px; font-size: 14px; }

        /* Stepper: full width second line */
        .item-stepper {
            flex: 0 0 100%;
            order: 10;
            justify-content: flex-end;
            gap: 6px;
        }
        .step-btn { width: 32px; height: 32px; font-size: 18px; }
        .step-qty { font-size: 16px; min-width: 46px; }

        /* Edit form */
        .edit-row { flex-wrap: wrap; }
        .edit-inp-name { flex: 1 1 100%; }
        .edit-inp-qty  { width: 80px; }
        .edit-inp-cat  { flex: 1 1 auto; }
        .edit-actions  { flex-direction: row; }
        .edit-save-btn, .edit-cancel-btn { flex: 1; text-align: center; }

        /* Dialog positioning: center on screen on mobile */
        #infoDialog {
            left: 50% !important;
            top: 50% !important;
            transform: translate(-50%, -50%);
            width: calc(100vw - 32px);
        }
    }
    </style>
</head>
<body>
<div class="page">

    <!-- Header -->
    <header class="hdr">
        <a href="index.html" class="btn-back" id="btnBack" title="Volver">&#8592;</a>
        <div class="hdr-titles">
            <h1 class="hdr-title">Bolso de Hermione</h1>
            <p class="hdr-sub">Inventario del grupo &middot; Todo cabe aquí dentro</p>
        </div>
        <div class="hdr-right">
            <div class="hdr-count" id="itemCount">—</div>
            <div class="hdr-count-lbl">objetos</div>
            <div class="save-status" id="saveStatus"></div>
        </div>
    </header>

    <!-- Add form -->
    <div class="add-panel">
        <div class="add-panel-label">✦ Añadir objeto</div>
        <div class="add-main-row">
            <!-- Media widget: photo or emoji -->
            <div class="add-media-widget">
                <div class="media-tabs">
                    <button class="mtab active" id="mmt-photo" onclick="setAddMode('photo')" title="Foto">📷</button>
                    <button class="mtab" id="mmt-emoji" onclick="setAddMode('emoji')" title="Emoji">😀</button>
                </div>
                <div class="add-img-btn" id="addImgBtn" title="Elegir imagen" onclick="document.getElementById('addImgInput').click()">
                    <img id="addImgPreview" src="" alt="" style="display:none">
                    <span class="add-img-icon" id="addImgIcon">🖼</span>
                </div>
                <input type="text" id="addEmojiInput" class="add-emoji-inp inp" placeholder="😀" maxlength="8"
                    oninput="pendingEmoji=this.value.trim()">
            </div>
            <input type="file" id="addImgInput" accept="image/*" onchange="onAddImgChange(this)" style="display:none">

            <div class="add-fields">
                <input type="text" id="addName" class="inp inp-name" placeholder="Nombre del objeto…" maxlength="80"
                    onkeydown="if(event.key==='Enter') addItem()">
                <input type="number" id="addQty" class="inp inp-qty" placeholder="Cant." min="1" value="1"
                    onkeydown="if(event.key==='Enter') addItem()">
            </div>
            <button class="btn-add" onclick="addItem()">+ Añadir</button>
        </div>
        <div class="add-desc-row">
            <textarea id="addDesc" class="inp inp-desc" placeholder="Descripción breve (opcional)…" maxlength="400"></textarea>
            <div class="add-cat-col">
                <select id="addCat" class="inp inp-cat" onchange="onAddCatChange(this.value)">
                    <option value="otras">📦 Otras cosas</option>
                    <option value="oro">🪙 Oro</option>
                    <option value="comida">🍖 Comida</option>
                    <option value="armas">⚔️ Armas</option>
                    <option value="armadura">🛡️ Armadura</option>
                    <option value="importante">💎 Importante</option>
                    <option value="pociones">🧪 Pociones</option>
                    <option value="pergaminos">📜 Pergaminos</option>
                </select>
                <select id="addSubclase" class="inp inp-cat" style="display:none">
                    <option value="cabeza">🪖 Cabeza</option>
                    <option value="cuello">📿 Cuello</option>
                    <option value="torso">👕 Torso</option>
                    <option value="brazos">💪 Brazos</option>
                    <option value="piernas">🦵 Piernas</option>
                    <option value="pies">👟 Pies</option>
                    <option value="dedos">💍 Dedos</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="search-wrap">
            <span class="search-ico">⌕</span>
            <input type="text" id="searchInput" class="search-inp" placeholder="Buscar objeto…" oninput="render()">
        </div>
        <select id="sortSel" class="sort-sel" onchange="render()">
            <option value="recent">Más recientes</option>
            <option value="name">A → Z</option>
            <option value="name-desc">Z → A</option>
            <option value="qty-desc">Mayor cantidad</option>
            <option value="qty-asc">Menor cantidad</option>
        </select>
    </div>

    <!-- List (rendered by JS) -->
    <div id="invRoot">
        <div class="inv-list">
            <div class="skel-row"></div>
            <div class="skel-row"></div>
            <div class="skel-row"></div>
        </div>
    </div>

</div>
<!-- Info popup (native dialog) -->
<dialog id="infoDialog">
    <div class="dialog-inner-wrap">
        <div class="dialog-hdr">
            <span class="dialog-name" id="dialogItemName"></span>
            <button class="dialog-close-btn" id="dialogCloseBtn" title="Cerrar">✕</button>
        </div>
        <textarea class="dialog-desc" id="dialogDesc" readonly></textarea>
        <p class="dialog-hint">ESC para cerrar · usa ✏ para editar</p>
    </div>
</dialog>

<!-- Lightbox -->
<dialog id="lightboxDialog">
    <img id="lightboxImg" src="" alt="">
    <button id="lightboxClose" title="Cerrar">✕</button>
</dialog>

<div class="snack" id="snack"></div>

<script>
const _params  = new URLSearchParams(location.search);
const CHAR_ID  = _params.get('char') || '__bolso_hermione__';
const CHAR_NAME = _params.get('name') ? decodeURIComponent(_params.get('name')) : null;
const BASE_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:3001' : location.origin;

const CATEGORIAS = [
    { id: 'oro',        label: 'Oro',              icon: '🪙' },
    { id: 'comida',     label: 'Comida',            icon: '🍖' },
    { id: 'armas',      label: 'Armas',             icon: '⚔️' },
    { id: 'armadura',   label: 'Armadura',          icon: '🛡️' },
    { id: 'importante', label: 'Cosas Importantes', icon: '💎' },
    { id: 'pociones',   label: 'Pociones',          icon: '🧪' },
    { id: 'pergaminos', label: 'Pergaminos',        icon: '📜' },
    { id: 'otras',      label: 'Otras Cosas',       icon: '📦' },
];

const SUBCLASES = [
    { id: 'cabeza',  label: 'Cabeza',  icon: '🪖' },
    { id: 'cuello',  label: 'Cuello',  icon: '📿' },
    { id: 'torso',   label: 'Torso',   icon: '👕' },
    { id: 'brazos',  label: 'Brazos',  icon: '💪' },
    { id: 'piernas', label: 'Piernas', icon: '🦵' },
    { id: 'pies',    label: 'Pies',    icon: '👟' },
    { id: 'dedos',   label: 'Dedos',   icon: '💍' },
];

let items      = [];
let saveTimer  = null;
let snackTmr   = null;
let pendingImg = null;
let pendingEmoji = '';
let addMode    = 'photo';
let editingId  = null;

function onAddCatChange(val) {
    document.getElementById('addSubclase').style.display = val === 'armadura' ? '' : 'none';
}

function setAddMode(mode) {
    addMode = mode;
    document.getElementById('mmt-photo').classList.toggle('active', mode === 'photo');
    document.getElementById('mmt-emoji').classList.toggle('active', mode === 'emoji');
    document.getElementById('addImgBtn').style.display   = mode === 'photo' ? 'flex' : 'none';
    document.getElementById('addEmojiInput').style.display = mode === 'emoji' ? 'flex' : 'none';
    if (mode === 'photo') { pendingEmoji = ''; document.getElementById('addEmojiInput').value = ''; }
    else { pendingImg = null; document.getElementById('addImgPreview').style.display = 'none'; document.getElementById('addImgIcon').style.display = ''; }
}

function setEditMode(id, mode) {
    const widget  = document.querySelector(`#row-${id} .edit-media-widget`);
    if (!widget) return;
    widget.querySelectorAll('.mtab').forEach((b, i) => b.classList.toggle('active', (i === 0) === (mode === 'photo')));
    const thumb   = document.getElementById(`edit-thumb-${id}`);
    const emojiInp = document.getElementById(`edit-emoji-${id}`);
    if (thumb)    thumb.style.display    = mode === 'photo' ? 'flex' : 'none';
    if (emojiInp) emojiInp.style.display = mode === 'emoji' ? 'flex' : 'none';
}

// collapsed state persisted in localStorage
const collapsedSections = new Set(
    JSON.parse(localStorage.getItem('bolso_collapsed') || '[]')
);
function toggleSection(catId) {
    if (collapsedSections.has(catId)) collapsedSections.delete(catId);
    else collapsedSections.add(catId);
    localStorage.setItem('bolso_collapsed', JSON.stringify([...collapsedSections]));
    render();
}

// ── Boot ──
window.addEventListener('DOMContentLoaded', () => {
    // Back button: go to character sheet if coming from one
    if (CHAR_NAME) {
        const backBtn = document.getElementById('btnBack');
        backBtn.removeAttribute('href');
        backBtn.style.cursor = 'pointer';
        backBtn.addEventListener('click', e => { e.preventDefault(); history.back(); });

        document.title = `Inventario — ${CHAR_NAME}`;
        document.querySelector('.hdr-title').textContent = `Inventario de ${CHAR_NAME}`;
        document.querySelector('.hdr-sub').textContent = `Objetos personales de ${CHAR_NAME}`;
    }
    load();

    // Info dialog wiring
    const dialog  = document.getElementById('infoDialog');
    const descEl  = document.getElementById('dialogDesc');

    // Close button
    document.getElementById('dialogCloseBtn').addEventListener('click', () => dialog.close());

    // Click outside (on backdrop) closes dialog
    dialog.addEventListener('click', e => {
        const rect = dialog.getBoundingClientRect();
        if (e.clientX < rect.left || e.clientX > rect.right ||
            e.clientY < rect.top  || e.clientY > rect.bottom) {
            dialog.close();
        }
    });

    // After close, clear currentInfoId
    dialog.addEventListener('close', () => { currentInfoId = null; });

    // Lightbox wiring
    const lb = document.getElementById('lightboxDialog');
    document.getElementById('lightboxClose').addEventListener('click', () => lb.close());
    lb.addEventListener('click', e => { if (e.target === lb) lb.close(); });

    // Event delegation — catch clicks on any .item-info button
    document.addEventListener('click', e => {
        const btn = e.target.closest('.item-info');
        if (!btn) return;
        const id = btn.dataset.iid;
        openInfoDialog(btn, id);
    });
});

async function load() {
    try {
        const res  = await fetch(`${BASE_URL}/api/player-characters`);
        const json = await res.json();
        const entry = (json.characters || []).find(c => c.charId === CHAR_ID);
        items = entry?.data?.items ?? [];
    } catch(e) {
        items = [];
        showSnack('Error al cargar el inventario');
    }
    render();
}

// ── Render ──
function render() {
    const root  = document.getElementById('invRoot');
    const query = document.getElementById('searchInput').value.toLowerCase();
    const sort  = document.getElementById('sortSel').value;

    let rows = query ? items.filter(it => it.nombre.toLowerCase().includes(query)) : [...items];

    if (sort === 'name')      rows.sort((a,b) => a.nombre.localeCompare(b.nombre));
    if (sort === 'name-desc') rows.sort((a,b) => b.nombre.localeCompare(a.nombre));
    if (sort === 'qty-desc')  rows.sort((a,b) => b.cantidad - a.cantidad);
    if (sort === 'qty-asc')   rows.sort((a,b) => a.cantidad - b.cantidad);
    if (sort === 'recent')    rows.sort((a,b) => (b.ts||0) - (a.ts||0));

    document.getElementById('itemCount').textContent = items.length;

    if (!rows.length) {
        root.innerHTML = `<div class="inv-list"><div class="empty">
            <div class="empty-ico">👜</div>
            <div class="empty-title">${query ? 'Sin resultados' : 'El bolso está vacío'}</div>
            <div class="empty-hint">${query ? 'Prueba otra búsqueda' : 'Añade el primer objeto usando el formulario de arriba'}</div>
        </div></div>`;
        return;
    }

    // Group by category, preserving CATEGORIAS order
    const grouped = new Map(CATEGORIAS.map(c => [c.id, []]));
    rows.forEach(it => {
        const cat = it.categoria || 'otras';
        if (!grouped.has(cat)) grouped.set(cat, []);
        grouped.get(cat).push(it);
    });

    root.innerHTML = CATEGORIAS.map(cat => {
        const catRows = grouped.get(cat.id) || [];
        if (!catRows.length) return '';
        const collapsed = collapsedSections.has(cat.id);
        return `
        <div class="cat-section">
            <div class="cat-hdr" onclick="toggleSection('${cat.id}')">
                <span class="cat-chevron${collapsed ? ' collapsed' : ''}">&#9654;</span>
                <span class="cat-hdr-icon">${cat.icon}</span>
                <span class="cat-hdr-label">${cat.label}</span>
                <div class="cat-hdr-line"></div>
                <span class="cat-hdr-count">${catRows.length} objeto${catRows.length !== 1 ? 's' : ''}</span>
            </div>
            ${collapsed ? '' : `<div class="inv-list">${catRows.map(it => renderRow(it)).join('')}</div>`}
        </div>`;
    }).join('');
}

function renderRow(it) {
    // Edit mode
    if (it.id === editingId) {
        const catOptions = CATEGORIAS.map(c =>
            `<option value="${c.id}"${c.id === (it.categoria||'otras') ? ' selected' : ''}>${c.icon} ${c.label}</option>`
        ).join('');
        const initEditMode = it.emoji && !it.img ? 'emoji' : 'photo';
        const thumbContent = it.img
            ? `<img src="${it.img}" alt="${esc(it.nombre)}">`
            : `<span class="add-img-icon">🖼</span>`;
        return `
        <div class="item-row item-row--editing" id="row-${it.id}">
            <div class="edit-row">
                <div class="edit-media-widget">
                    <div class="media-tabs">
                        <button class="mtab${initEditMode === 'photo' ? ' active' : ''}" onclick="setEditMode('${it.id}','photo')" title="Foto">📷</button>
                        <button class="mtab${initEditMode === 'emoji' ? ' active' : ''}" onclick="setEditMode('${it.id}','emoji')" title="Emoji">😀</button>
                    </div>
                    <div class="item-thumb" id="edit-thumb-${it.id}" title="Cambiar imagen"
                         style="display:${initEditMode === 'photo' ? 'flex' : 'none'}"
                         onclick="pickItemImg('${it.id}')">
                        ${thumbContent}
                        <input type="file" class="item-thumb-input" id="img-input-${it.id}" accept="image/*"
                            onchange="onItemImgChange(this,'${it.id}')">
                    </div>
                    <input type="text" class="add-emoji-inp inp" id="edit-emoji-${it.id}"
                        placeholder="😀" maxlength="8" value="${esc(it.emoji||'')}"
                        style="display:${initEditMode === 'emoji' ? 'flex' : 'none'}">
                </div>
                <input class="inp edit-inp-name" id="edit-name-${it.id}" value="${esc(it.nombre)}" maxlength="80"
                    onkeydown="if(event.key==='Enter') saveEdit('${it.id}'); if(event.key==='Escape') cancelEdit();">
                <input class="inp edit-inp-qty" id="edit-qty-${it.id}" type="number" value="${it.cantidad}" min="1">
            </div>
            <div class="edit-cat-col">
                <select class="inp edit-inp-cat" id="edit-cat-${it.id}"
                    onchange="document.getElementById('edit-subclase-${it.id}').style.display=this.value==='armadura'?'':'none'">
                    ${catOptions}
                </select>
                <select class="inp edit-inp-cat" id="edit-subclase-${it.id}"
                    style="display:${(it.categoria||'')==='armadura'?'':'none'}">
                    ${SUBCLASES.map(s=>`<option value="${s.id}"${s.id===(it.subclase||'torso')?' selected':''}>${s.icon} ${s.label}</option>`).join('')}
                </select>
            </div>
            <textarea class="inp edit-inp-desc" id="edit-desc-${it.id}" maxlength="400"
                placeholder="Descripción breve (opcional)…">${esc(it.desc||'')}</textarea>
            <div class="edit-actions">
                <button class="edit-cancel-btn" onclick="cancelEdit()">Cancelar</button>
                <button class="edit-save-btn" onclick="saveEdit('${it.id}')">✓ Guardar</button>
            </div>
        </div>`;
    }

    // Normal mode
    const hasImg   = !!it.img;
    const hasEmoji = !!it.emoji;
    let thumb, thumbClick;
    if (hasImg) {
        thumb     = `<img src="${it.img}" alt="${esc(it.nombre)}">`;
        thumbClick = `onclick="openLightbox('${it.id}')" title="Ver imagen" style="cursor:zoom-in"`;
    } else if (hasEmoji) {
        thumb     = `<span class="emoji-thumb-display">${esc(it.emoji)}</span>`;
        thumbClick = `style="cursor:default"`;
    } else {
        thumb     = `<span>📦</span>`;
        thumbClick = `style="cursor:default"`;
    }
    return `
    <div class="item-row" id="row-${it.id}">
        <div class="item-thumb" ${thumbClick}>
            ${thumb}
        </div>
        <div class="item-name">${esc(it.nombre)}</div>
        <button class="item-info${it.desc ? ' active' : ''}" data-iid="${it.id}"
            title="${it.desc ? 'Ver descripción' : 'Añadir descripción'}"
            aria-label="Descripción de ${esc(it.nombre)}">i</button>
        <button class="item-edit-btn" onclick="editItem('${it.id}')" title="Editar objeto" aria-label="Editar ${esc(it.nombre)}">✏</button>
        <div class="item-stepper">
            <button class="step-btn" onclick="changeQty('${it.id}',-1)" aria-label="Reducir">−</button>
            <input class="step-qty" type="number" min="0" value="${it.cantidad}"
                onchange="setQty('${it.id}',this.value)"
                onclick="this.select()"
                style="width:${Math.max(52, String(it.cantidad).length * 12 + 24)}px"
                aria-label="Cantidad">
            <button class="step-btn" onclick="changeQty('${it.id}',1)" aria-label="Aumentar">+</button>
        </div>
        <button class="item-del" onclick="deleteItem('${it.id}')" title="Eliminar" aria-label="Eliminar ${esc(it.nombre)}">✕</button>
    </div>`;
}

// ── Add ──
function onAddImgChange(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        pendingImg = e.target.result;
        const preview = document.getElementById('addImgPreview');
        const icon    = document.getElementById('addImgIcon');
        preview.src = pendingImg;
        preview.style.display = 'block';
        icon.style.display    = 'none';
    };
    reader.readAsDataURL(file);
}

function addItem() {
    const nameEl = document.getElementById('addName');
    const qtyEl  = document.getElementById('addQty');
    const descEl   = document.getElementById('addDesc');
    const catEl    = document.getElementById('addCat');
    const nombre   = nameEl.value.trim();
    const cantidad = Math.max(1, parseInt(qtyEl.value) || 1);
    const desc     = descEl.value.trim();
    const categoria = catEl.value;
    const subclase  = categoria === 'armadura' ? (document.getElementById('addSubclase').value || 'torso') : null;
    if (!nombre) { nameEl.focus(); return; }

    const useEmoji = addMode === 'emoji' && pendingEmoji;
    const existing = items.find(it => it.nombre.toLowerCase() === nombre.toLowerCase());
    if (existing) {
        existing.cantidad += cantidad;
        if (pendingImg && !existing.img)   existing.img   = pendingImg;
        if (useEmoji && !existing.emoji)   existing.emoji = pendingEmoji;
        if (desc && !existing.desc)        existing.desc  = desc;
    } else {
        items = [{ id: `i${Date.now()}`, nombre, cantidad, categoria, subclase: subclase || null,
                   desc: desc || null, ts: Date.now(),
                   img: useEmoji ? null : (pendingImg || null),
                   emoji: useEmoji ? pendingEmoji : null }, ...items];
    }

    // reset form
    nameEl.value = ''; qtyEl.value = 1; descEl.value = '';
    pendingImg = null; pendingEmoji = '';
    const preview = document.getElementById('addImgPreview');
    const icon    = document.getElementById('addImgIcon');
    preview.src = ''; preview.style.display = 'none'; icon.style.display = '';
    document.getElementById('addImgInput').value = '';
    document.getElementById('addEmojiInput').value = '';
    setAddMode('photo');
    nameEl.focus();

    render();
    scheduleSave();
}

// ── Lightbox ──
function openLightbox(id) {
    const it = items.find(i => i.id === id);
    if (!it || !it.img) return;
    document.getElementById('lightboxImg').src = it.img;
    document.getElementById('lightboxDialog').showModal();
}

// ── Item image ──
function pickItemImg(id) {
    const input = document.getElementById(`img-input-${id}`);
    if (input) input.click();
}

function onItemImgChange(input, id) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const it = items.find(i => i.id === id);
        if (it) it.img = e.target.result;
        render();
        scheduleSave();
    };
    reader.readAsDataURL(file);
}

// ── Mutations ──
function changeQty(id, delta) {
    const it = items.find(i => i.id === id);
    if (!it) return;
    const next = it.cantidad + delta;
    if (next <= 0) { deleteItem(id); return; }
    it.cantidad = next;
    // patch DOM
    const row = document.getElementById(`row-${id}`);
    if (row) {
        const inp = row.querySelector('.step-qty');
        if (inp) { inp.value = next; inp.style.width = Math.max(52, String(next).length * 12 + 24) + 'px'; }
    }
    scheduleSave();
}

function setQty(id, raw) {
    const val = parseInt(raw);
    if (isNaN(val) || val < 0) return;
    if (val === 0) { deleteItem(id); return; }
    const it = items.find(i => i.id === id);
    if (it) { it.cantidad = val; }
    scheduleSave();
}

function deleteItem(id) {
    const row = document.getElementById(`row-${id}`);
    if (row) {
        row.style.transition = 'opacity .2s, transform .2s';
        row.style.opacity = '0'; row.style.transform = 'translateX(8px)';
        setTimeout(() => { items = items.filter(i => i.id !== id); render(); scheduleSave(); }, 200);
    }
}

// ── Edit ──
function editItem(id) {
    const dialog = document.getElementById('infoDialog');
    if (dialog.open) dialog.close();
    editingId = id;
    render();
    // focus name input after render
    requestAnimationFrame(() => {
        const inp = document.getElementById(`edit-name-${id}`);
        if (inp) { inp.focus(); inp.select(); }
    });
}

function saveEdit(id) {
    const nombre   = document.getElementById(`edit-name-${id}`)?.value.trim();
    const cantidad = parseInt(document.getElementById(`edit-qty-${id}`)?.value) || 1;
    const categoria = document.getElementById(`edit-cat-${id}`)?.value || 'otras';
    const subclase  = categoria === 'armadura'
        ? (document.getElementById(`edit-subclase-${id}`)?.value || 'torso')
        : null;
    const desc     = document.getElementById(`edit-desc-${id}`)?.value.trim() || null;
    if (!nombre) { document.getElementById(`edit-name-${id}`)?.focus(); return; }

    const emojiInp   = document.getElementById(`edit-emoji-${id}`);
    const isEmojiMode = emojiInp && emojiInp.style.display !== 'none';
    const emoji      = isEmojiMode ? (emojiInp.value.trim() || null) : null;

    const it = items.find(i => i.id === id);
    if (it) {
        it.nombre = nombre; it.cantidad = cantidad; it.categoria = categoria;
        it.subclase = subclase; it.desc = desc;
        if (isEmojiMode) { it.emoji = emoji; it.img = null; }
        else             { it.emoji = null; }
    }

    editingId = null;
    render();
    scheduleSave();
}

function cancelEdit() {
    if (!editingId) return;
    editingId = null;
    render();
}

// ── Info dialog ──
let currentInfoId = null;

function openInfoDialog(btn, id) {
    const dialog = document.getElementById('infoDialog');
    const descEl = document.getElementById('dialogDesc');
    const nameEl = document.getElementById('dialogItemName');

    // If same button clicked again, close
    if (dialog.open && currentInfoId === id) { dialog.close(); return; }
    if (dialog.open) dialog.close();

    const it = items.find(i => i.id === id);
    nameEl.textContent = it ? it.nombre : id;
    descEl.value = it ? (it.desc || 'Sin descripción') : 'Sin descripción';
    currentInfoId = id;

    // Position near the button
    const rect = btn.getBoundingClientRect();
    const dw = 300, dh = 160;
    let left = rect.left + rect.width / 2 - dw / 2;
    let top  = rect.bottom + 8;
    if (left + dw > window.innerWidth - 12) left = window.innerWidth - dw - 12;
    if (left < 12) left = 12;
    if (top + dh > window.innerHeight - 12) top = rect.top - dh - 8;
    dialog.style.left = left + 'px';
    dialog.style.top  = top  + 'px';

    dialog.showModal();
}

// ── Save ──
function scheduleSave() {
    clearTimeout(saveTimer);
    setSaveStatus('Guardando…');
    saveTimer = setTimeout(save, 800);
}

async function save() {
    try {
        await fetch(`${BASE_URL}/api/player-characters/${CHAR_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: { items } }),
        });
        setSaveStatus('Guardado ✓');
        setTimeout(() => setSaveStatus(''), 2500);
    } catch(e) {
        setSaveStatus('Error al guardar');
        showSnack('No se pudo guardar el inventario');
    }
}

function setSaveStatus(t) { document.getElementById('saveStatus').textContent = t; }

function showSnack(msg, ms = 3500) {
    const el = document.getElementById('snack');
    el.textContent = msg; el.classList.add('on');
    clearTimeout(snackTmr);
    snackTmr = setTimeout(() => el.classList.remove('on'), ms);
}

function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
